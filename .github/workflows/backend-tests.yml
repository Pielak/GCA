name: Backend Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd backend
        pip install poetry
        poetry install

    # MVP 11 Fase 11.5 — garante que DT-041 (image drift pypdf/reportlab/esprima)
    # não reaparece: imports críticos têm que funcionar direto da instalação poetry.
    - name: Verify critical extraction libs are importable
      run: |
        cd backend
        poetry run python -c "import pypdf, reportlab, esprima; print('pypdf', pypdf.__version__); print('reportlab', reportlab.__version__); print('esprima OK')"

    - name: Run tests (excluding e2e lane)
      run: |
        cd backend
        if [ -d "app/tests/" ]; then
          # MVP 11 Fase 11.7 — e2e sai do --ignore e passa a ser desselecionado
          # via marker. Arquivo continua na coleta; job `e2e` abaixo cobre.
          poetry run pytest app/tests/ --cov=app -m "not e2e"
        else
          echo "⚠️ No tests directory found. Skipping tests."
        fi

  docker-image:
    # MVP 11 Fase 11.5 — fecha DT-041 em CI: rebuild --no-cache da imagem
    # backend e valida que as libs críticas sobrevivem no container final.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build backend image from scratch (no cache)
      run: docker build --no-cache -t gca-backend-ci:fase115 backend

    - name: Verify extraction libs inside built image
      run: |
        docker run --rm gca-backend-ci:fase115 \
          python -c "import pypdf, reportlab, esprima; print('image-build OK')"

  e2e:
    # MVP 11 Fase 11.7 — lane dedicada de GUI E2E. Executa apenas quando
    # test_fluxo_completo.py ou seus suportes mudam (paths no on:). Instala
    # playwright + chromium on-demand para não inchar a imagem backend.
    runs-on: ubuntu-latest
    needs: [test]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install backend deps + playwright chromium
      run: |
        cd backend
        pip install poetry
        poetry install
        poetry run pip install playwright
        poetry run playwright install --with-deps chromium

    - name: Boot docker stack (postgres + backend + frontend)
      run: docker compose up -d postgres backend frontend

    - name: Wait for services to be healthy
      run: |
        for i in {1..30}; do
          if curl -fsS http://localhost:8000/api/v1/setup/status >/dev/null 2>&1; then
            echo "backend ready"
            break
          fi
          sleep 2
        done

    - name: Run e2e lane
      env:
        E2E_BASE_URL: http://localhost:3000
        E2E_API_URL: http://localhost:8000
      run: |
        cd backend
        poetry run pytest app/tests/e2e/ -m e2e -v
      continue-on-error: true  # smoke: reporta sem bloquear merge até estabilização

