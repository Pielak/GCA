
services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: gca-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gca
      POSTGRES_USER: gca
      POSTGRES_PASSWORD: gca_secret
    ports:
      - "5432:5432"
    volumes:
      - gca-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gca"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: gca-redis
    restart: unless-stopped
    # Porta não exposta no host — Redis do sistema já ocupa 6379
    # Backend acessa via rede Docker (redis:6379)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama (DT-023) — daemon LLM local acessível ao backend via DNS interna
  # do Docker Compose. Mounta os modelos do host read-only para reusar o que
  # o GP já tem instalado (qwen2.5-coder:7b, deepseek-r1:7b, etc) sem
  # duplicar 4-8GB por modelo. Sem expose de porta — não conflita com o
  # daemon Ollama do host (que continua escutando 127.0.0.1:11434).
  # Acesso pelo backend: http://ollama:11434
  ollama:
    image: ollama/ollama:latest
    container_name: gca-ollama
    restart: unless-stopped
    volumes:
      - /usr/share/ollama/.ollama:/root/.ollama:ro
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gca-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://gca:gca_secret@postgres:5432/gca
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
      DEBUG: "True"
      MAX_RETRIES: ${MAX_RETRIES:-3}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: gca
      POSTGRES_USER: gca
      POSTGRES_PASSWORD: gca_secret
      INGESTION_VIA_N8N: "true"
      INGESTION_MAX_PARALLEL_PER_PROJECT: "${INGESTION_MAX_PARALLEL_PER_PROJECT:-1}"
      N8N_BASE_URL: ${N8N_BASE_URL:-http://n8n:5678}
      GCA_CALLBACK_BASE_URL: ${GCA_CALLBACK_BASE_URL:-http://gca-backend:8000}
      GCA_WEBHOOK_SECRET: "45b64e16b5653718023408419aade9a9a35ab244d1897bccebf51270f3b1cb6b"
      NORMALIZER_SECRET: "d74ac09664abc7957cfc16ba3efbc068a08fcb3af9b84d055ca940a6afb377b0"
      CONFERENTE_SECRET: "a1a181c0d85c328777be4eb42e1c60c1b2584913645199b0453d58961a5a3456"
      SPECIALIST_SECRET: "413a72e9401f1977c4e6ec16dabf9ea6e36862f391d274c681e9e650bb367649"
      N8N_CALLBACK_SECRET: "2fb3334dcee25cdb3d234879a76fb4f0190e837d17856187c7a7084e2b210e5a"
      REDIS_HOST: redis
      N8N_REDIS_DB: "2"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./logs:/home/luiz/GCA/logs
      # DT-030: uploads de Ingestão persistem entre restarts do container.
      # Antes: STORAGE_PATH=/tmp/gca-storage dentro do container, sem mount
      # → todo restart apagava os bytes (DB mantinha registro, arquivo sumia).
      # Volume nomeado mantém os arquivos em /var/lib/docker/volumes/.
      - gca-uploads-storage:/tmp/gca-storage
      # DT-061: scripts montados read-only pra testes verificarem
      # estrutura/sintaxe dos scripts de backup/restore.
      - ./scripts:/host_scripts:ro
      # Backup-1: volume dedicado para backups por projeto.
      - gca-backups:/var/gca-backups
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # MVP 13 Fase 13.1 — Celery Worker (fila persistente de tasks do pipeline).
  # Broker + result backend: Redis (DBs 1 e 2 respectivamente).
  # Worker roda em processo separado para resiliência: se backend cair,
  # tasks continuam na fila; se worker cair, tasks rearmadas via ACK late.
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gca-celery-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://gca:gca_secret@postgres:5432/gca
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: gca
      POSTGRES_USER: gca
      POSTGRES_PASSWORD: gca_secret
      INGESTION_VIA_N8N: "true"
      INGESTION_MAX_PARALLEL_PER_PROJECT: "${INGESTION_MAX_PARALLEL_PER_PROJECT:-1}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - gca-uploads-storage:/tmp/gca-storage
      - gca-backups:/var/gca-backups
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1
    # MVP 17 Fase 17.1 (DT-078): healthcheck usa CMD-SHELL pra interpolar
    # $HOSTNAME no runtime — o hostname real do container é o ID curto do
    # docker (ex: `982577f2232a`), não o `container_name` do compose. O
    # `$$` escapa a interpolação do compose para o shell receber `$HOSTNAME`.
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 2026-04-25 — Celery beat scheduler. Roda tasks periódicas (watchdog
  # de docs zombie a cada 5 min). Sem ele, doc preso em 'processing' só
  # era limpo no restart do backend.
  # MVP 14 Fase 14.10 — Flower (UI de monitoramento do Celery).
  # Expõe dashboard em :5555 com filas, workers, DLQ visual e histórico.
  # Não requer restart: o worker envia eventos; Flower lê do broker.
  celery-flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gca-celery-flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    command: celery -A app.celery_app flower --port=5555 --broker=redis://redis:6379/1 --persistent=True --db=/tmp/flower.db
    volumes:
      - gca-flower-data:/tmp

  # Frontend (React + Vite)
  frontend:
    image: node:20-alpine
    container_name: gca-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    working_dir: /app
    environment:
      VITE_APP_URL: http://localhost:5173
      VITE_API_URL: http://gca-backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run build && npm run preview -- --host 0.0.0.0 --port 5173"

  # n8n Workflow Automation
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_API_DISABLED: "false"
      N8N_PUBLIC_API_DISABLED: "false"
      # Code node JS task runner — default 60s estoura no Conferente Parse G2
      # quando LLM retorna respostas longas + parse pesado. 5min cobre folga.
      N8N_RUNNERS_TASK_TIMEOUT: "300"
      N8N_RUNNERS_ENABLED: "true"
      N8N_RUNNERS_MODE: "internal"
    volumes:
      - /home/luiz/.n8n:/home/node/.n8n

volumes:
  gca-postgres-data:
  gca-uploads-storage:
  # Backup-1: backups por projeto persistem entre restarts. Path no
  # container: /var/gca-backups. Caller: project_backup_service.
  gca-backups:
  # MVP 14 Fase 14.10 — DB sqlite do Flower persiste histórico entre restarts.
  gca-flower-data:

networks:
  default:
    name: gca-network
